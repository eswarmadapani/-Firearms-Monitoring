<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Upload & Analyze | AI Surveillance</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        .sidebar {
            width: 260px;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .main-content {
            margin-left: 260px;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        .sidebar-menu a {
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
            padding-left: 1.25rem;
        }

        .sidebar-menu a.active {
            background: rgba(0, 212, 255, 0.15);
            border-left: 3px solid var(--accent-primary);
            color: var(--accent-primary);
            font-weight: 600;
        }

        .upload-card {
            backdrop-filter: blur(12px);
        }

        .drop-zone {
            transition: all 0.3s ease;
        }

        .drop-zone:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.05);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 50;
                height: 100vh;
            }

            .main-content {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-gray-900">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-screen glass-strong overflow-y-auto">
        <div class="p-6">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <svg class="w-9 h-9" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="url(#grad1)" stroke-width="3" opacity="0.3" />
                    <path d="M50 20 L50 80 M20 50 L80 50" stroke="url(#grad1)" stroke-width="2" />
                    <circle cx="50" cy="50" r="7" fill="url(#grad1)" />
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00d4ff" />
                            <stop offset="100%" style="stop-color:#0099ff" />
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <h2 class="text-lg font-semibold text-white">AI Surveillance</h2>
                    <p class="text-xs text-gray-400">Detection System</p>
                </div>
            </div>

            <!-- Menu -->
            <nav class="sidebar-menu space-y-2 text-sm">
                <a href="home.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white active">
                    <span>Home</span>
                </a>

                <a href="analytics.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    <span>Analytics</span>
                </a>

                <a href="detection-logs.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    <span>Detection Logs</span>
                </a>

                <a href="live-monitoring.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    <span>Live Monitoring</span>
                </a>

                <a href="settings.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    <span>Settings</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-content min-h-screen">

        <!-- Navbar -->
        <nav class="glass sticky top-0 z-40 border-b border-gray-700">
            <div class="px-6 py-4 flex items-center justify-between">

                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="md:hidden text-gray-300 hover:text-white">
                        ☰
                    </button>
                    <h1 id="page-title" class="text-lg font-semibold text-white">
                        Upload & Analyze
                    </h1>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="p-6">
            <div class="max-w-4xl mx-auto">

                <!-- Upload Section -->
                <div class="glass-strong upload-card rounded-2xl p-6 mb-6 border border-gray-700">
                    <h2 class="text-xl font-semibold text-white mb-1">
                        Upload Media for Analysis
                    </h2>
                    <p class="text-sm text-gray-400 mb-6">
                        Upload an image or video to detect firearms, faces, and other objects.
                    </p>

                    <!-- Drop Zone -->
                    <div id="drop-zone"
                        class="drop-zone border-2 border-dashed border-gray-600 rounded-xl p-10 text-center cursor-pointer">

                        <svg class="w-12 h-12 mx-auto text-gray-500 mb-4" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>

                        <p class="text-sm font-medium text-gray-300 mb-1">
                            Drag & Drop your file here
                        </p>
                        <p class="text-xs text-gray-500 mb-6">
                            or choose an option below
                        </p>

                        <div class="flex gap-3 justify-center">
                            <button id="upload-image-btn" class="btn btn-primary">
                                Upload Image
                            </button>

                            <button id="upload-video-btn" class="btn btn-secondary">
                                Upload Video
                            </button>
                        </div>
                    </div>

                    <input type="file" id="file-input" class="hidden">
                </div>

                <!-- Preview -->
                <div id="preview-section"
                    class="hidden glass-strong rounded-2xl p-6 mb-6 border border-gray-700">
                    <h3 class="text-lg font-semibold text-white mb-4">Preview</h3>
                    <div id="preview-container" class="mb-4"></div>

                    <button id="analyze-btn" class="btn btn-primary w-full hidden">
                        Analyze with AI
                    </button>
                </div>

                <!-- Results -->
                <div id="results-section"
                    class="hidden glass-strong rounded-2xl p-6 border border-gray-700">
                    <h3 class="text-lg font-semibold text-white mb-4">
                        Detection Results
                    </h3>
                    <div id="results-container"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/home.js"></script>
</body>

</html>
