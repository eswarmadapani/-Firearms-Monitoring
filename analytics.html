<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | AI Surveillance</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        .sidebar {
            width: 260px;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .main-content {
            margin-left: 260px;
            transition: margin-left 0.3s ease;
        }

        .sidebar-menu a {
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
            padding-left: 1.25rem;
        }

        .sidebar-menu a.active {
            background: rgba(0, 212, 255, 0.15);
            border-left: 3px solid var(--accent-primary);
            color: var(--accent-primary);
            font-weight: 600;
        }

        .analytics-card {
            padding: 1.25rem;
        }

        .chart-container {
            height: 280px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 50;
                height: 100vh;
            }

            .main-content {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-gray-900">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-screen glass-strong overflow-y-auto">
        <div class="p-6">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <svg class="w-9 h-9" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="url(#grad1)" stroke-width="3" opacity="0.3" />
                    <path d="M50 20 L50 80 M20 50 L80 50" stroke="url(#grad1)" stroke-width="2" />
                    <circle cx="50" cy="50" r="7" fill="url(#grad1)" />
                    <defs>
                        <linearGradient id="grad1">
                            <stop offset="0%" style="stop-color:#00d4ff" />
                            <stop offset="100%" style="stop-color:#0099ff" />
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <h2 class="text-lg font-semibold text-white">AI Surveillance</h2>
                    <p class="text-xs text-gray-400">Detection System</p>
                </div>
            </div>

            <!-- Menu -->
            <nav class="sidebar-menu space-y-2 text-sm">
                <a href="home.html" class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    Home
                </a>

                <a href="analytics.html"
                    class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:text-white active">
                    Analytics
                </a>

                <a href="detection-logs.html"
                    class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    Detection Logs
                </a>

                <a href="live-monitoring.html"
                    class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    Live Monitoring
                </a>

                <a href="settings.html"
                    class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:text-white">
                    Settings
                </a>
            </nav>

        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content min-h-screen">

        <!-- Navbar -->
        <nav class="glass sticky top-0 z-40 border-b border-gray-700">
            <div class="px-6 py-4 flex items-center justify-between">

                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="md:hidden text-gray-300 hover:text-white">
                        ☰
                    </button>
                    <h1 id="page-title" class="text-lg font-semibold text-white">
                        Analytics Dashboard
                    </h1>
                </div>

                <div
                    class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-white text-sm font-semibold">
                    AD
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="p-6">
            <div class="max-w-7xl mx-auto">

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

                    <div class="card card-lift analytics-card">
                        <p class="text-gray-400 text-xs mb-1">Total Scans</p>
                        <p class="text-3xl font-bold text-white" data-counter="1247"></p>
                    </div>

                    <div class="card card-lift analytics-card">
                        <p class="text-gray-400 text-xs mb-1">Threats Detected</p>
                        <p class="text-3xl font-bold text-red-400" data-counter="38"></p>
                    </div>

                    <div class="card card-lift analytics-card">
                        <p class="text-gray-400 text-xs mb-1">Average Accuracy</p>
                        <p class="text-3xl font-bold text-green-400"
                            data-counter="92.4" data-suffix="%"></p>
                    </div>

                    <div class="card card-lift analytics-card">
                        <p class="text-gray-400 text-xs mb-1">Active Alerts</p>
                        <p class="text-3xl font-bold text-yellow-400" data-counter="3"></p>
                    </div>

                </div>

                <!-- Charts -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

                    <div class="card analytics-card">
                        <h3 class="text-sm font-semibold text-white mb-4">
                            Detection Trends (Last 7 Days)
                        </h3>
                        <div class="chart-container">
                            <canvas id="trends-chart"></canvas>
                        </div>
                    </div>

                    <div class="card analytics-card">
                        <h3 class="text-sm font-semibold text-white mb-4">
                            Detection Types Breakdown
                        </h3>
                        <div class="chart-container">
                            <canvas id="types-chart"></canvas>
                        </div>
                    </div>

                </div>

                <!-- Patterns -->
                <div class="card analytics-card">
                    <h3 class="text-sm font-semibold text-white mb-4">
                        Hourly Detection Patterns
                    </h3>
                    <div class="chart-container">
                        <canvas id="patterns-chart"></canvas>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/analytics.js"></script>
</body>

</html>
